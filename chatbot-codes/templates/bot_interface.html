<!DOCTYPE html>
<html>
<head>
    <title>Day 1: AI Search Bot</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 350px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        #messages { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .bot { background: #e1f5fe; align-self: flex-start; }
        .user { background: #c8e6c9; margin-left: auto; }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="messages"></div>
        <div style="display:flex; padding:10px;">
            <input type="text" id="user-input" style="flex:1;" placeholder="Try 'search hackathon'...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('messages');
        const userId = "user_" + Math.random().toString(16).slice(2);

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value;
            if(!message) return;

            appendMessage(message, 'user');
            input.value = '';

            // This URL must match the @app.route in app.py
            const response = await fetch('/chat_logic', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message, user_id: userId })
            });
            const data = await response.json();
            appendMessage(data.response, 'bot');

            if (data.redirect_url) {
                setTimeout(() => { window.location.href = data.redirect_url; }, 2000);
            }
        }

        function appendMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.onload = () => appendMessage("Hello! I am Day 1 of the AI bot. Type 'search hackathon'.", 'bot');
    </script>
</body>
</html>
